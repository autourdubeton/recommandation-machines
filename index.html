<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Au Tour du Béton</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',system-ui,sans-serif;color:#e8e8e8;min-height:100vh;background:#1a1a2e;background-image:url('photo-sol.jpg');background-size:cover;background-position:center;background-attachment:fixed}body::before{content:'';position:fixed;inset:0;background:rgba(8,10,20,0.78);z-index:0;pointer-events:none}header,div.wrap,div.bloc,button{position:relative;z-index:1}header{background:linear-gradient(135deg,rgba(13,21,69,.97),rgba(26,35,126,.97) 50%,rgba(13,21,69,.97));padding:16px 32px;display:flex;align-items:center;gap:16px;box-shadow:0 4px 30px rgba(0,0,0,.7);border-bottom:2px solid rgba(200,168,0,.4)}.logo{width:46px;height:46px;background:linear-gradient(135deg,#c8a800,#e6c200);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#0d1545;flex-shrink:0}header h1{font-size:1.25rem;font-weight:700;color:#fff}header p{font-size:.75rem;color:rgba(255,255,255,.5);margin-top:2px}.wrap{max-width:1300px;margin:0 auto;padding:16px 20px}.bloc{background:rgba(8,12,35,.82);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:14px 20px;margin-bottom:10px}.bt{font-size:.7rem;font-weight:700;color:#c8a800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}.bt::before{content:'';display:inline-block;width:3px;height:13px;background:#c8a800;border-radius:2px}.sub{font-weight:400;color:rgba(255,255,255,.25);font-size:.65rem;text-transform:none;letter-spacing:0}.row{display:flex;gap:8px}.row>div{flex:1;min-width:0}label{display:block;font-size:.63rem;font-weight:700;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}select{width:100%;padding:7px 10px;border:1px solid rgba(255,255,255,.12);border-radius:8px;font-size:.8rem;color:#e8e8e8;background:rgba(0,0,0,.55);cursor:pointer;-webkit-appearance:none}select option{background:#0d1030}.ptags{display:flex;gap:7px;flex-wrap:wrap}.pbtn{padding:6px 14px;border:1px solid rgba(255,255,255,.15);border-radius:14px;font-size:.76rem;cursor:pointer;background:rgba(255,255,255,.05);color:rgba(255,255,255,.55);white-space:nowrap}.pbtn.on{background:rgba(200,168,0,.18);border-color:#c8a800;color:#e6c200;font-weight:600}.sbtn{width:100%;padding:13px;background:linear-gradient(135deg,#c8a800,#e6c200);color:#0d1545;border:none;border-radius:12px;font-size:.95rem;font-weight:800;cursor:pointer;margin-bottom:16px}.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.rb{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:5px 12px;font-size:.78rem;color:rgba(255,255,255,.45);cursor:pointer}.cnt{font-size:.78rem;color:rgba(255,255,255,.28);margin-bottom:12px}.mc{border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:16px 18px;margin-bottom:10px;position:relative;overflow:hidden;background:rgba(5,8,25,.78)}.mc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}.r1::before{background:linear-gradient(180deg,#FFD700,#FFA500)}.r2::before{background:linear-gradient(180deg,#C0C0C0,#909090)}.r3::before{background:linear-gradient(180deg,#CD7F32,#8B5A1A)}.r1{border-color:rgba(255,215,0,.2)}.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}.mn{font-size:1rem;font-weight:700;color:#fff}.mrk{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.75rem;background:rgba(255,255,255,.07);color:rgba(255,255,255,.35)}.mr{font-size:.72rem;color:rgba(255,255,255,.38);font-style:italic;margin-bottom:8px}.fns{font-size:.72rem;color:rgba(200,168,0,.9);margin-bottom:8px}.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}.tag{padding:3px 9px;border-radius:6px;font-size:.67rem;font-weight:600}.te{background:rgba(33,150,243,.15);color:#64B5F6;border:1px solid rgba(33,150,243,.2)}.ts{background:rgba(76,175,80,.12);color:#81C784;border:1px solid rgba(76,175,80,.2)}.ta{background:rgba(255,152,0,.12);color:#FFB74D;border:1px solid rgba(255,152,0,.2)}.tac{background:rgba(156,39,176,.12);color:#CE93D8;border:1px solid rgba(156,39,176,.2)}.tc{background:rgba(0,150,136,.12);color:#4DB6AC;border:1px solid rgba(0,150,136,.2)}.tg{background:rgba(200,168,0,.12);color:#c8a800;border:1px solid rgba(200,168,0,.2)}.badge{background:linear-gradient(135deg,#c8a800,#e6c200);color:#0d1545;font-size:.62rem;font-weight:800;padding:2px 8px;border-radius:7px;margin-left:7px}.sb{display:flex;align-items:center;gap:8px}.bt2{flex:1;height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}.bf{height:100%;border-radius:3px;background:linear-gradient(90deg,#c8a800,#e6c200)}.bv{font-size:.72rem;font-weight:700;color:#c8a800;min-width:30px;text-align:right}</style></head><body><header><div class="logo">AB</div><div><h1>Au Tour du Béton</h1><p>Outil d'aide à la recommandation machine</p></div></header><div class="wrap"><div class="bloc"><div class="bt">Critères du client <span class="sub">(éliminatoires)</span></div><div class="row"><div><label>⚡ Énergie</label><select id="en"><option value="">Indifférent</option><option>220 V</option><option>380 V</option><option>Propane</option></select></div><div><label>Surface</label><select id="su"><option value="">Indifférent</option><option value="< 50m²">&lt;50m²</option><option value="50 à 150m²">50-150m²</option><option value="150 à 500m²">150-500m²</option><option value="> 500m²">&gt;500m²</option></select></div><div><label>Vocation</label><select id="vo"><option value="">Indifférent</option><option value="bordurage">Bordurage</option><option value="poncage">Ponçage</option><option value="preparation">Préparation</option><option value="polissage">Polissage</option><option value="bouchardage">Bouchardage</option></select></div><div><label>Agressivité</label><select id="ag"><option value="">Indifférent</option><option value="Léger">Légère</option><option value="Moyen">Moyenne</option><option value="Agressif">Agressive</option><option value="Très Agressif">Très agressive</option></select></div><div><label>Accessibilité</label><select id="ac"><option value="">Indifférent</option><option value="Très Difficile">Très difficile</option><option value="Difficile">Difficile</option><option value="Normale">Normale</option><option value="Facile">Facile</option></select></div><div><label>Catégorie</label><select id="ca"><option value="">Indifférent</option><option value="Compacte">Compacte</option><option value="Petite">Petite</option><option value="Moyenne">Moyenne</option><option value="Grosse">Grosse</option><option value="Industrielle">Industrielle</option></select></div></div></div><div class="bloc"><div class="bt">Priorités client <span class="sub">(classement)</span></div><div class="ptags"><button class="pbtn" data-p="finition" onclick="tp(this)">✨ Finition</button><button class="pbtn" data-p="prix" onclick="tp(this)">💰 Prix</button><button class="pbtn" data-p="productivite" onclick="tp(this)">⚡ Productivité</button><button class="pbtn" data-p="simplicite" onclick="tp(this)">Simplicité</button><button class="pbtn" data-p="polyvalence" onclick="tp(this)">Polyvalence</button></div></div><button class="sbtn" onclick="go()">🔍 Trouver les meilleures machines</button><div id="res" style="display:none"><div class="bloc"><div class="rh"><div class="bt" style="margin-bottom:0">Recommandations</div><button class="rb" onclick="raz()">↺ Nouvelle recherche</button></div><div id="rc" class="cnt"></div><div id="rl"></div></div></div></div><script>const M=[{nom:"Scoot",en:"220 V",su:"< 50m²",bordurage:1,poncage:1,preparation:0,polissage:0,bouchardage:0,ag:"Léger",ac:"Très Difficile",finition:1,prix:1,productivite:0,simplicite:0,polyvalence:0,cat:"Compacte",gam:"Industrielle",role:"Bordurage espace très contraint"},{nom:"Scoot Bouchardes",en:"220 V",su:"< 50m²",bordurage:1,poncage:1,preparation:0,polissage:0,bouchardage:1,ag:"Léger",ac:"Très Difficile",finition:1,prix:1,productivite:0,simplicite:0,polyvalence:0,cat:"Compacte",gam:"Entrée",role:"Bordurage + bouchardage léger"},{nom:"Scoot Stand Up",en:"220 V",su:"< 50m²",bordurage:1,poncage:1,preparation:0,polissage:0,bouchardage:1,ag:"Léger",ac:"Très Difficile",finition:1,prix:1,productivite:0,simplicite:0,polyvalence:0,cat:"Compacte",gam:"Entrée",role:"Bordurage debout"},{nom:"SH270MLC",en:"220 V",su:"< 50m²",bordurage:0,poncage:0,preparation:1,polissage:0,bouchardage:0,ag:"Moyen",ac:"Difficile",finition:0,prix:0,productivite:1,simplicite:1,polyvalence:0,cat:"Petite",gam:"Entrée",role:"Préparation petite surface"},{nom:"SH270M",en:"220 V",su:"< 50m²",bordurage:0,poncage:0,preparation:1,polissage:0,bouchardage:0,ag:"Moyen",ac:"Difficile",finition:0,prix:0,productivite:1,simplicite:1,polyvalence:0,cat:"Petite",gam:"Entrée",role:"Préparation petite surface"},{nom:"BU270M",en:"220 V",su:"50 à 150m²",bordurage:0,poncage:1,preparation:1,polissage:0,bouchardage:1,ag:"Agressif",ac:"Difficile",finition:1,prix:0,productivite:1,simplicite:1,polyvalence:0,cat:"Petite",gam:"Entrée",role:"Ponçage + bouchardage"},{nom:"TH500M",en:"220 V",su:"50 à 150m²",bordurage:0,poncage:1,preparation:1,polissage:1,bouchardage:1,ag:"Moyen",ac:"Normale",finition:1,prix:0,productivite:0,simplicite:0,polyvalence:1,cat:"Moyenne",gam:"Milieu",role:"Polyvalente 220V moyenne surface"},{nom:"TH500T",en:"380 V",su:"150 à 500m²",bordurage:0,poncage:1,preparation:1,polissage:1,bouchardage:1,ag:"Agressif",ac:"Normale",finition:0,prix:0,productivite:1,simplicite:0,polyvalence:1,cat:"Moyenne",gam:"Milieu",role:"Ponçage agressif grande surface"},{nom:"SH320T",en:"380 V",su:"150 à 500m²",bordurage:0,poncage:0,preparation:1,polissage:0,bouchardage:0,ag:"Agressif",ac:"Normale",finition:0,prix:0,productivite:1,simplicite:0,polyvalence:0,cat:"Moyenne",gam:"Milieu",role:"Préparation agressive grande surface"},{nom:"L14EU",en:"220 V",su:"< 50m²",bordurage:1,poncage:0,preparation:0,polissage:0,bouchardage:0,ag:"Moyen",ac:"Très Difficile",finition:1,prix:0,productivite:1,simplicite:1,polyvalence:0,cat:"Petite",gam:"Entrée",role:"Bordurage accès très difficile"},{nom:"L16EU",en:"220 V",su:"50 à 150m²",bordurage:0,poncage:1,preparation:1,polissage:1,bouchardage:1,ag:"Léger",ac:"Normale",finition:0,prix:0,productivite:0,simplicite:0,polyvalence:1,cat:"Petite",gam:"Entrée",role:"Machine légère polyvalente"},{nom:"L20OES7",en:"220 V",su:"150 à 500m²",bordurage:0,poncage:1,preparation:1,polissage:1,bouchardage:1,ag:"Moyen",ac:"Difficile",finition:1,prix:0,productivite:0,simplicite:0,polyvalence:1,cat:"Moyenne",gam:"Milieu",role:"Polyvalente ponçage polissage bouchardage"},{nom:"L25RES7",en:"380 V",su:"> 500m²",bordurage:0,poncage:1,preparation:1,polissage:1,bouchardage:1,ag:"Agressif",ac:"Facile",finition:1,prix:0,productivite:1,simplicite:0,polyvalence:0,cat:"Grosse",gam:"Prénium",role:"Ponçage grande surface"},{nom:"L31RES7",en:"380 V",su:"> 500m²",bordurage:0,poncage:1,preparation:1,polissage:1,bouchardage:1,ag:"Très Agressif",ac:"Facile",finition:1,prix:0,productivite:1,simplicite:0,polyvalence:0,cat:"Industrielle",gam:"Industrielle",role:"Ponçage industriel grande surface"},{nom:"L38GREB",en:"Propane",su:"> 500m²",bordurage:0,poncage:1,preparation:0,polissage:0,bouchardage:1,ag:"Très Agressif",ac:"Facile",finition:0,prix:0,productivite:1,simplicite:0,polyvalence:0,cat:"Industrielle",gam:"Industrielle",role:"Extérieur propane grande surface"}];const SU={"< 50m²":1,"50 à 150m²":2,"150 à 500m²":3,"> 500m²":4},AG={"Léger":1,Moyen:2,Agressif:3,"Très Agressif":4},AC={"Très Difficile":4,Difficile:3,Normale:2,Facile:1},CA={Compacte:4,Petite:3,Moyenne:2,Grosse:1,Industrielle:0},VL=["bordurage","poncage","preparation","polissage","bouchardage"],VN={bordurage:"Bordurage",poncage:"Ponçage",preparation:"Préparation",polissage:"Polissage",bouchardage:"Bouchardage"};let ap=new Set();function tp(b){const p=b.dataset.p;ap.has(p)?(ap.delete(p),b.classList.remove("on")):(ap.add(p),b.classList.add("on"))}function g(id){return document.getElementById(id).value}function sc(m){const en=g("en"),su=g("su"),vo=g("vo"),ag=g("ag"),ac=g("ac"),ca=g("ca");if(en&&m.en!==en)return-9999;if(vo&&!m[vo])return-9999;if(su&&SU[m.su]<SU[su])return-9999;if(ag&&AG[m.ag]<AG[ag])return-9999;if(ac&&AC[m.ac]<AC[ac])return-9999;if(ca&&CA[m.cat]<CA[ca])return-9999;let s=0;if(su)s+=m.su===su?20:-(SU[m.su]-SU[su])*5;if(ag)s+=m.ag===ag?20:-(AG[m.ag]-AG[ag])*5;if(ac)s+=m.ac===ac?20:-(AC[m.ac]-AC[ac])*5;if(ca)s+=m.cat===ca?20:-(CA[m.cat]-CA[ca])*5;ap.forEach(p=>{s+=m[p]?30:0});VL.forEach(v=>{if(m[v])s+=2});return s}function go(){const r=M.map(m=>({...m,ms:sc(m)})).filter(m=>m.ms>-9999).sort((a,b)=>b.ms-a.ms);document.getElementById("res").style.display="block";document.getElementById("res").scrollIntoView({behavior:"smooth"});document.getElementById("rc").textContent=r.length+" machine"+(r.length>1?"s":"")+" trouvée"+(r.length>1?"s":"");if(!r.length){document.getElementById("rl").innerHTML='<p style="text-align:center;padding:32px;color:rgba(255,255,255,.3)">Aucune machine ne correspond.</p>';return}const sv=r.map(m=>m.ms),mn=Math.min(...sv),mx=Math.max(...sv);document.getElementById("rl").innerHTML=r.map((m,i)=>{const k=i+1,cl=k<=3?"r"+k:"",pct=mx===mn?100:Math.round(10+(m.ms-mn)/(mx-mn)*90),fns=VL.filter(v=>m[v]).map(v=>VN[v]).join(", ");return'<div class="mc '+cl+'"><div class="mh"><div><span class="mn">'+m.nom+'</span>'+(k===1?'<span class="badge">⭐ Recommandé</span>':'')+'</div><div class="mrk">'+k+'</div></div><div class="mr">'+m.role+'</div>'+(fns?'<div class="fns">✅ '+fns+'</div>':'')+'<div class="tags"><span class="tag te">'+m.en+'</span><span class="tag ts">'+m.su+'</span><span class="tag ta">'+m.ag+'</span><span class="tag tac">'+m.ac+'</span><span class="tag tc">'+m.cat+'</span><span class="tag tg">'+m.gam+'</span></div><div class="sb"><span style="font-size:.67rem;color:rgba(255,255,255,.22);min-width:55px">Pertinence</span><div class="bt2"><div class="bf" style="width:'+pct+'%"></div></div><span class="bv">'+pct+'%</span></div></div>';}).join("")}function raz(){["en","su","vo","ag","ac","ca"].forEach(id=>document.getElementById(id).value="");ap.clear();document.querySelectorAll(".pbtn").forEach(b=>b.classList.remove("on"));document.getElementById("res").style.display="none";window.scrollTo({top:0,behavior:"smooth"})}</script></body></html>
