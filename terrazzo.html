<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Au Tour du Béton — Terrazzo</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',system-ui,sans-serif;color:#e8e8e8;min-height:100vh;background:#1a1a2e;background-image:url('photo-sol.jpg');background-size:cover;background-position:center;background-attachment:fixed}body::before{content:'';position:fixed;inset:0;background:rgba(8,10,20,0.80);z-index:0;pointer-events:none}header,div.wrap,div.bloc,button{position:relative;z-index:1}header{background:linear-gradient(135deg,rgba(13,21,69,.97),rgba(26,35,126,.97) 50%,rgba(13,21,69,.97));padding:16px 32px;display:flex;align-items:center;gap:16px;box-shadow:0 4px 30px rgba(0,0,0,.7);border-bottom:2px solid rgba(200,168,0,.4)}.logo{width:46px;height:46px;background:linear-gradient(135deg,#c8a800,#e6c200);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#0d1545;flex-shrink:0}header h1{font-size:1.25rem;font-weight:700;color:#fff}header p{font-size:.75rem;color:rgba(255,255,255,.5);margin-top:2px}.wrap{max-width:1100px;margin:0 auto;padding:20px}.bloc{background:rgba(8,12,35,.85);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:16px 22px;margin-bottom:12px}.bt{font-size:.7rem;font-weight:700;color:#c8a800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;display:flex;align-items:center;gap:6px}.bt::before{content:'';display:inline-block;width:3px;height:13px;background:#c8a800;border-radius:2px}.row{display:flex;gap:10px;flex-wrap:wrap}.row>div{flex:1;min-width:160px}label{display:block;font-size:.63rem;font-weight:700;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}select{width:100%;padding:8px 10px;border:1px solid rgba(255,255,255,.12);border-radius:8px;font-size:.82rem;color:#e8e8e8;background:rgba(0,0,0,.6);cursor:pointer;-webkit-appearance:none}select option{background:#0d1030}.sbtn{width:100%;padding:14px;background:linear-gradient(135deg,#c8a800,#e6c200);color:#0d1545;border:none;border-radius:12px;font-size:.95rem;font-weight:800;cursor:pointer;margin-bottom:16px;box-shadow:0 4px 20px rgba(200,168,0,.3)}.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.rb{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:5px 14px;font-size:.78rem;color:rgba(255,255,255,.45);cursor:pointer}.mc{border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:18px 20px;margin-bottom:12px;background:rgba(5,8,25,.82);position:relative;overflow:hidden}.mc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:rgba(255,255,255,.08)}.r1::before{background:linear-gradient(180deg,#FFD700,#FFA500)}.r2::before{background:linear-gradient(180deg,#C0C0C0,#909090)}.r3::before{background:linear-gradient(180deg,#CD7F32,#8B5A1A)}.r1{border-color:rgba(255,215,0,.2)}.mh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}.mn{font-size:1.05rem;font-weight:700;color:#fff}.msub{font-size:.72rem;color:rgba(255,255,255,.35);margin-top:2px}.mrk{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;background:rgba(255,255,255,.07);color:rgba(255,255,255,.35);flex-shrink:0}.badge{background:linear-gradient(135deg,#c8a800,#e6c200);color:#0d1545;font-size:.62rem;font-weight:800;padding:2px 8px;border-radius:7px;margin-left:8px;vertical-align:middle}.stitle{font-size:.65rem;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;margin-top:12px}.steps{display:flex;flex-direction:column;gap:6px}.step{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid rgba(255,255,255,.06)}.snum{width:22px;height:22px;border-radius:50%;background:rgba(200,168,0,.15);border:1px solid rgba(200,168,0,.3);display:flex;align-items:center;justify-content:center;font-size:.67rem;font-weight:800;color:#c8a800;flex-shrink:0}.sinfo{flex:1}.sname{font-size:.78rem;font-weight:600;color:#e8e8e8}.sdet{font-size:.67rem;color:rgba(255,255,255,.35);margin-top:1px}.stag{font-size:.63rem;padding:2px 7px;border-radius:5px;background:rgba(200,168,0,.1);color:#c8a800;border:1px solid rgba(200,168,0,.2);white-space:nowrap}.dim{font-size:.67rem;color:rgba(255,255,255,.25);margin-left:auto;white-space:nowrap}.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}.tag{padding:3px 9px;border-radius:6px;font-size:.65rem;font-weight:600}.te{background:rgba(33,150,243,.12);color:#64B5F6;border:1px solid rgba(33,150,243,.2)}.ts{background:rgba(76,175,80,.1);color:#81C784;border:1px solid rgba(76,175,80,.18)}.tc{background:rgba(0,150,136,.1);color:#4DB6AC;border:1px solid rgba(0,150,136,.18)}.cnt{font-size:.78rem;color:rgba(255,255,255,.28);margin-bottom:12px}.sep{height:1px;background:rgba(255,255,255,.06);margin:10px 0}</style></head><body>
<header><div class="logo">AB</div><div><h1>Au Tour du Béton — Terrazzo</h1><p>Protocole AD LUCEM — Aide à la recommandation</p></div></header>
<div class="wrap">
<div class="bloc">
  <div class="bt">Sélectionner la machine</div>
  <div class="row">
    <div><label>Machine</label><select id="machine" onchange="go()"><option value="">-- Choisir une machine --</option><option>Scoot</option><option>Scoot Bouchardes</option><option>Scoot Stand Up</option><option>L14EU</option><option>SH270MLC</option><option>SH270M</option><option>BU270M</option><option>SH320T</option><option>TH500M</option><option>TH500T</option><option>L16EU</option><option>L20OES7</option><option>L25RES7</option><option>L31RES7</option><option>L38GREB</option></select></div>
    <div><label>Type de travail</label><select id="travail" onchange="go()"><option value="">Tous</option><option value="granito">Ponçage granito</option><option value="bordurage">Bordurage</option></select></div>
  </div>
</div>
<div id="res" style="display:none">
  <div class="bloc">
    <div class="rh"><div class="bt" style="margin-bottom:0">Protocole recommandé</div><button class="rb" onclick="raz()">↺ Réinitialiser</button></div>
    <div id="rc" class="cnt"></div>
    <div id="rl"></div>
  </div>
</div>
</div>
<script>
const MACHINES = {
  "Scoot":          {diam:125,diamMachine:125, pla:0,pads:1,dia:0,hur:0,pucks:0,cer:0,seg:0,turbo:1,resine:1},
  "Scoot Bouchardes":{diam:125,diamMachine:125,pla:0,pads:1,dia:0,hur:0,pucks:0,cer:0,seg:0,turbo:1,resine:1},
  "Scoot Stand Up": {diam:125,diamMachine:125, pla:0,pads:1,dia:0,hur:0,pucks:0,cer:0,seg:0,turbo:1,resine:1},
  "L14EU":          {diam:335,diamMachine:335, pla:1,pads:1,dia:1,hur:1,pucks:1,cer:1,seg:0,turbo:0,resine:0},
  "SH270MLC":       {diam:270,diamMachine:270, pla:0,pads:0,dia:0,hur:0,pucks:0,cer:0,seg:1,turbo:0,resine:0},
  "SH270M":         {diam:270,diamMachine:270, pla:0,pads:0,dia:0,hur:0,pucks:0,cer:0,seg:1,turbo:0,resine:0},
  "BU270M":         {diam:270,diamMachine:270, pla:0,pads:0,dia:0,hur:0,pucks:0,cer:0,seg:1,turbo:0,resine:0},
  "SH320T":         {diam:250,diamMachine:250, pla:0,pads:0,dia:0,hur:0,pucks:0,cer:0,seg:1,turbo:0,resine:0},
  "TH500M":         {diam:250,diamMachine:500, pla:1,pads:1,dia:1,hur:1,pucks:1,cer:1,seg:1,turbo:0,resine:0},
  "TH500T":         {diam:250,diamMachine:500, pla:1,pads:1,dia:1,hur:1,pucks:1,cer:1,seg:1,turbo:0,resine:0},
  "L16EU":          {diam:180,diamMachine:430, pla:1,pads:1,dia:1,hur:1,pucks:1,cer:1,seg:1,turbo:0,resine:0},
  "L20OES7":        {diam:230,diamMachine:500, pla:1,pads:1,dia:1,hur:1,pucks:1,cer:1,seg:1,turbo:0,resine:0},
  "L25RES7":        {diam:230,diamMachine:650, pla:1,pads:1,dia:1,hur:1,pucks:1,cer:1,seg:1,turbo:0,resine:0},
  "L31RES7":        {diam:335,diamMachine:800, pla:1,pads:1,dia:1,hur:1,pucks:1,cer:1,seg:1,turbo:0,resine:0},
  "L38GREB":        {diam:335,diamMachine:1000,pla:1,pads:0,dia:0,hur:0,pucks:0,cer:0,seg:1,turbo:0,resine:0}
};

const PROTOCOLE_GRANITO = [
  {tool:"Plaquettes liant métal",grain:"#25",eau:false,note:"Bien aspirer entre les grains"},
  {tool:"Plaquettes liant métal",grain:"#40",eau:false,note:"Bien aspirer entre les grains"},
  {tool:"Plaquettes liant métal",grain:"#80",eau:false,note:"Bien aspirer entre les grains"},
  {tool:"Pads souples Métal",grain:"#100/120",diam:335,eau:false,note:"Bien aspirer entre les grains"},
  {tool:"GROUTING",type:"sep"},
  {tool:"Pads souples Métal",grain:"#100/120",diam:335,eau:false,note:"Bien aspirer, nettoyer à l'eau"},
  {tool:"Pucks résine Blanche",grain:"#200",eau:true,note:"Bien laver entre les grains"},
  {tool:"Pucks résine Blanche",grain:"#400",eau:false,note:"Bien aspirer entre les grains"},
  {tool:"Pucks résine Blanche",grain:"#800",eau:false,note:"Bien aspirer entre les grains"},
  {tool:"SEALER",type:"sep"},
  {tool:"Hurricane",grain:"#800",diam:335,note:"Éventuellement lustreuse"},
  {tool:"Hurricane",grain:"#1500",diam:335,note:"Éventuellement lustreuse"}
];

const PROTOCOLE_BORDURAGE = [
  {tool:"Plateau Turbo M14",grain:"#Moyen",diam:335,note:"Bien aspirer entre les grains"},
  {tool:"Plateau Turbo M14",grain:"#Fin",diam:335,note:"Bien aspirer entre les grains"},
  {tool:"Pads souples Métal",grain:"#100/120",note:"Bien aspirer, nettoyer à l'eau"},
  {tool:"GROUTING",type:"sep"},
  {tool:"Pads souples Métal",grain:"#100/120",diam:335,note:"Bien aspirer entre les grains"},
  {tool:"Pads Résine Souples",grain:"#200",eau:true,diam:335,note:"Bien laver entre les grains"},
  {tool:"Pads Résine Souples",grain:"#400",eau:false,diam:335,note:"Bien aspirer entre les grains"},
  {tool:"Pads Résine Souples",grain:"#800",eau:false,diam:335,note:"Bien aspirer entre les grains"},
  {tool:"SEALER",type:"sep"},
  {tool:"Hurricane",grain:"#800",diam:335,note:"Éventuellement lustreuse"},
  {tool:"Hurricane",grain:"#1500",diam:335,note:"Éventuellement lustreuse"}
];

const TOOL_KEY = {
  "Plaquettes liant métal":"pla",
  "Pads souples Métal":"pads",
  "Pucks résine Blanche":"pucks",
  "Hurricane":"hur",
  "Plateau Turbo M14":"turbo",
  "Pads Résine Souples":"resine",
  "Pads souples Métal":"pads"
};

function go(){
  const mNom = document.getElementById("machine").value;
  const trav = document.getElementById("travail").value;
  if(!mNom){document.getElementById("res").style.display="none";return;}
  
  const m = MACHINES[mNom];
  document.getElementById("res").style.display="block";
  
  const showGranito = !trav || trav==="granito";
  const showBord = !trav || trav==="bordurage";
  
  // Vérifier compatibilité
  const canGranito = m.pla||m.pads||m.pucks;
  const canBord = m.turbo||m.resine;
  
  let html = `<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
    <span class="tag te">Ø outil: ${m.diam}mm</span>
    <span class="tag ts">Ø machine: ${m.diamMachine}mm</span>
  </div>`;

  if(showGranito){
    html += renderProtocole(mNom, m, "Ponçage Granito", PROTOCOLE_GRANITO, canGranito);
  }
  if(showBord){
    html += renderProtocole(mNom, m, "Bordurage", PROTOCOLE_BORDURAGE, canBord);
  }
  
  document.getElementById("rc").textContent = mNom + " — Protocole AD LUCEM";
  document.getElementById("rl").innerHTML = html;
}

function renderProtocole(mNom, m, titre, proto, compatible){
  if(!compatible){
    return `<div class="mc" style="opacity:.5"><div class="mh"><div><div class="mn">${titre}</div><div class="msub">Non compatible avec cette machine</div></div></div></div>`;
  }
  
  let steps = "";
  let num = 0;
  proto.forEach(s => {
    if(s.type === "sep"){
      steps += `<div style="display:flex;align-items:center;gap:10px;margin:8px 0">
        <div style="flex:1;height:1px;background:rgba(200,168,0,.2)"></div>
        <span style="font-size:.65rem;font-weight:700;color:#c8a800;letter-spacing:.8px">${s.tool}</span>
        <div style="flex:1;height:1px;background:rgba(200,168,0,.2)"></div>
      </div>`;
      return;
    }
    
    const key = TOOL_KEY[s.tool];
    const ok = !key || m[key];
    num++;
    
    steps += `<div class="step" style="${ok?'':'opacity:.35;filter:grayscale(1)'}">
      <div class="snum">${num}</div>
      <div class="sinfo">
        <div class="sname">${s.tool}</div>
        ${s.note?`<div class="sdet">${s.note}</div>`:''}
      </div>
      ${s.grain?`<span class="stag">${s.grain}${s.eau?' 💧':''}</span>`:''}
      ${s.diam?`<span class="dim">Ø${s.diam}</span>`:''}
    </div>`;
  });
  
  return `<div class="mc r1" style="margin-bottom:14px">
    <div class="mh"><div class="mn">${titre}<span class="badge">AD LUCEM</span></div></div>
    <div class="steps">${steps}</div>
  </div>`;
}

function raz(){
  document.getElementById("machine").value="";
  document.getElementById("travail").value="";
  document.getElementById("res").style.display="none";
}
</script></body></html>
