<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Au Tour du Béton — Terrazzo</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;color:#e8e8e8;min-height:100vh;background:#1a1a2e;background-image:url('photo-sol.jpg');background-size:cover;background-position:center;background-attachment:fixed;font-size:16px}
body::before{content:'';position:fixed;inset:0;background:rgba(8,10,20,0.80);z-index:0;pointer-events:none}
header,div.wrap,div.bloc,button{position:relative;z-index:1}
header{background:linear-gradient(135deg,rgba(13,21,69,.97),rgba(26,35,126,.97) 50%,rgba(13,21,69,.97));padding:18px 32px;display:flex;align-items:center;gap:16px;box-shadow:0 4px 30px rgba(0,0,0,.7);border-bottom:2px solid rgba(200,168,0,.4)}
.logo{width:50px;height:50px;background:linear-gradient(135deg,#c8a800,#e6c200);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#0d1545;flex-shrink:0}
header h1{font-size:1.35rem;font-weight:700;color:#fff}
header p{font-size:.85rem;color:rgba(255,255,255,.5);margin-top:2px}
.wrap{max-width:900px;margin:0 auto;padding:22px 20px}
.bloc{background:rgba(8,12,35,.85);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:18px 24px;margin-bottom:14px}
.bt{font-size:.78rem;font-weight:700;color:#c8a800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.bt::before{content:'';display:inline-block;width:3px;height:14px;background:#c8a800;border-radius:2px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>div{flex:1;min-width:200px}
label{display:block;font-size:.75rem;font-weight:700;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
select{width:100%;padding:10px 12px;border:1px solid rgba(255,255,255,.12);border-radius:8px;font-size:.9rem;color:#e8e8e8;background:rgba(0,0,0,.6);cursor:pointer;-webkit-appearance:none}
select option{background:#0d1030}
.sbtn{width:100%;padding:15px;background:linear-gradient(135deg,#c8a800,#e6c200);color:#0d1545;border:none;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer;margin-bottom:18px;box-shadow:0 4px 20px rgba(200,168,0,.3)}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.rb{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:6px 16px;font-size:.85rem;color:rgba(255,255,255,.45);cursor:pointer}
.cnt{font-size:.85rem;color:rgba(255,255,255,.28);margin-bottom:14px}
.mc{border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:20px 22px;margin-bottom:14px;background:rgba(5,8,25,.82);position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:rgba(255,255,255,.08)}
.r1::before{background:linear-gradient(180deg,#FFD700,#FFA500)}
.r1{border-color:rgba(255,215,0,.2)}
.mh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.mn{font-size:1.1rem;font-weight:700;color:#fff}
.badge{background:linear-gradient(135deg,#c8a800,#e6c200);color:#0d1545;font-size:.68rem;font-weight:800;padding:3px 9px;border-radius:7px;margin-left:8px;vertical-align:middle}
.steps{display:flex;flex-direction:column;gap:7px}
.step{display:flex;align-items:center;gap:12px;padding:10px 14px;background:rgba(255,255,255,.04);border-radius:9px;border:1px solid rgba(255,255,255,.06)}
.snum{width:26px;height:26px;border-radius:50%;background:rgba(200,168,0,.15);border:1px solid rgba(200,168,0,.3);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;color:#c8a800;flex-shrink:0}
.sinfo{flex:1}
.sname{font-size:.9rem;font-weight:600;color:#e8e8e8}
.sdet{font-size:.76rem;color:rgba(255,255,255,.38);margin-top:2px}
.stag{font-size:.72rem;padding:3px 9px;border-radius:5px;background:rgba(200,168,0,.1);color:#c8a800;border:1px solid rgba(200,168,0,.2);white-space:nowrap;font-weight:600}
.dim{font-size:.72rem;color:rgba(255,255,255,.3);margin-left:6px;white-space:nowrap}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tag{padding:4px 11px;border-radius:6px;font-size:.76rem;font-weight:600}
.te{background:rgba(33,150,243,.12);color:#64B5F6;border:1px solid rgba(33,150,243,.2)}
.ts{background:rgba(76,175,80,.1);color:#81C784;border:1px solid rgba(76,175,80,.18)}
</style></head><body>
<header><div class="logo">AB</div><div><h1>Au Tour du Béton — Terrazzo</h1><p>Protocole AD LUCEM — Aide à la recommandation</p></div></header>
<div class="wrap">
<div class="bloc">
  <div class="bt">Sélectionner la machine</div>
  <div class="row">
    <div><label>Machine</label>
    <select id="machine" onchange="go()">
      <option value="">-- Choisir une machine --</option>
      <option>Scoot</option><option>Scoot Bouchardes</option><option>Scoot Stand Up</option>
      <option>L14EU</option><option>SH270MLC</option><option>SH270M</option><option>BU270M</option>
      <option>SH320T</option><option>TH500M</option><option>TH500T</option><option>L16EU</option>
      <option>L20OES7</option><option>L25RES7</option><option>L31RES7</option><option>L38GREB</option>
    </select></div>
    <div><label>Type de travail</label>
    <select id="travail" onchange="go()">
      <option value="">Tous</option>
      <option value="granito">Ponçage granito</option>
      <option value="bordurage">Bordurage</option>
    </select></div>
  </div>
</div>
<div id="res" style="display:none">
  <div class="bloc">
    <div class="rh"><div class="bt" style="margin-bottom:0">Protocole recommandé</div><button class="rb" onclick="raz()">↺ Réinitialiser</button></div>
    <div id="rc" class="cnt"></div>
    <div id="rl"></div>
  </div>
</div>
</div>
<script>
const MACHINES={
  "Scoot":          {diam:125,diamMachine:125, pla:0,pads:1,dia:0,hur:0,pucks:0,cer:0,seg:0,turbo:1,resine:1},
  "Scoot Bouchardes":{diam:125,diamMachine:125,pla:0,pads:1,dia:0,hur:0,pucks:0,cer:0,seg:0,turbo:1,resine:1},
  "Scoot Stand Up": {diam:125,diamMachine:125, pla:0,pads:1,dia:0,hur:0,pucks:0,cer:0,seg:0,turbo:1,resine:1},
  "L14EU":          {diam:335,diamMachine:335, pla:1,pads:1,dia:1,hur:1,pucks:1,cer:1,seg:0,turbo:0,resine:0},
  "SH270MLC":       {diam:270,diamMachine:270, pla:0,pads:0,dia:0,hur:0,pucks:0,cer:0,seg:1,turbo:0,resine:0},
  "SH270M":         {diam:270,diamMachine:270, pla:0,pads:0,dia:0,hur:0,pucks:0,cer:0,seg:1,turbo:0,resine:0},
  "BU270M":         {diam:270,diamMachine:270, pla:0,pads:0,dia:0,hur:0,pucks:0,cer:0,seg:1,turbo:0,resine:0},
  "SH320T":         {diam:250,diamMachine:250, pla:0,pads:0,dia:0,hur:0,pucks:0,cer:0,seg:1,turbo:0,resine:0},
  "TH500M":         {diam:250,diamMachine:500, pla:1,pads:1,dia:1,hur:1,pucks:1,cer:1,seg:1,turbo:0,resine:0},
  "TH500T":         {diam:250,diamMachine:500, pla:1,pads:1,dia:1,hur:1,pucks:1,cer:1,seg:1,turbo:0,resine:0},
  "L16EU":          {diam:180,diamMachine:430, pla:1,pads:1,dia:1,hur:1,pucks:1,cer:1,seg:1,turbo:0,resine:0},
  "L20OES7":        {diam:230,diamMachine:500, pla:1,pads:1,dia:1,hur:1,pucks:1,cer:1,seg:1,turbo:0,resine:0},
  "L25RES7":        {diam:230,diamMachine:650, pla:1,pads:1,dia:1,hur:1,pucks:1,cer:1,seg:1,turbo:0,resine:0},
  "L31RES7":        {diam:335,diamMachine:800, pla:1,pads:1,dia:1,hur:1,pucks:1,cer:1,seg:1,turbo:0,resine:0},
  "L38GREB":        {diam:335,diamMachine:1000,pla:1,pads:0,dia:0,hur:0,pucks:0,cer:0,seg:1,turbo:0,resine:0}
};

// Ø335 = uniquement les consommables qui sont physiquement à 335mm (Pads souples Métal et Hurricane)
// Les Plaquettes liant métal et Pucks résine n'ont pas de diamètre fixe
const PROTOCOLE_GRANITO=[
  {tool:"Plaquettes liant métal",grain:"#25",note:"Bien aspirer entre les grains"},
  {tool:"Plaquettes liant métal",grain:"#40",note:"Bien aspirer entre les grains"},
  {tool:"Plaquettes liant métal",grain:"#80",note:"Bien aspirer entre les grains"},
  {tool:"Pads souples Métal",grain:"#100/120",diam:335,note:"Bien aspirer entre les grains"},
  {type:"sep",tool:"GROUTING"},
  {tool:"Pads souples Métal",grain:"#100/120",diam:335,note:"Bien aspirer, nettoyer à l'eau"},
  {tool:"Pucks résine Blanche",grain:"#200",eau:true,note:"Bien laver entre les grains"},
  {tool:"Pucks résine Blanche",grain:"#400",note:"Bien aspirer entre les grains"},
  {tool:"Pucks résine Blanche",grain:"#800",note:"Bien aspirer entre les grains"},
  {type:"sep",tool:"SEALER"},
  {tool:"Hurricane",grain:"#800",diam:335,note:"Éventuellement lustreuse"},
  {tool:"Hurricane",grain:"#1500",diam:335,note:"Éventuellement lustreuse"}
];

const PROTOCOLE_BORDURAGE=[
  {tool:"Plateau Turbo M14",grain:"#Moyen",diam:335,note:"Bien aspirer entre les grains"},
  {tool:"Plateau Turbo M14",grain:"#Fin",diam:335,note:"Bien aspirer entre les grains"},
  {tool:"Pads souples Métal",grain:"#100/120",diam:335,note:"Bien aspirer, nettoyer à l'eau"},
  {type:"sep",tool:"GROUTING"},
  {tool:"Pads souples Métal",grain:"#100/120",diam:335,note:"Bien aspirer entre les grains"},
  {tool:"Pads Résine Souples",grain:"#200",eau:true,diam:335,note:"Bien laver entre les grains"},
  {tool:"Pads Résine Souples",grain:"#400",diam:335,note:"Bien aspirer entre les grains"},
  {tool:"Pads Résine Souples",grain:"#800",diam:335,note:"Bien aspirer entre les grains"},
  {type:"sep",tool:"SEALER"},
  {tool:"Hurricane",grain:"#800",diam:335,note:"Éventuellement lustreuse"},
  {tool:"Hurricane",grain:"#1500",diam:335,note:"Éventuellement lustreuse"}
];

const TOOL_KEY={
  "Plaquettes liant métal":"pla",
  "Pads souples Métal":"pads",
  "Pucks résine Blanche":"pucks",
  "Hurricane":"hur",
  "Plateau Turbo M14":"turbo",
  "Pads Résine Souples":"resine"
};

function go(){
  const mNom=document.getElementById("machine").value;
  const trav=document.getElementById("travail").value;
  if(!mNom){document.getElementById("res").style.display="none";return;}
  const m=MACHINES[mNom];
  document.getElementById("res").style.display="block";
  const showG=!trav||trav==="granito";
  const showB=!trav||trav==="bordurage";
  const canG=m.pla||m.pads||m.pucks||m.hur;
  const canB=m.turbo||m.resine||m.pads||m.hur;
  let html=`<div class="tags"><span class="tag te">Ø outil : ${m.diam} mm</span><span class="tag ts">Ø machine : ${m.diamMachine} mm</span></div>`;
  if(showG) html+=renderProto(mNom,m,"Ponçage Granito",PROTOCOLE_GRANITO,canG);
  if(showB) html+=renderProto(mNom,m,"Bordurage",PROTOCOLE_BORDURAGE,canB);
  document.getElementById("rc").textContent=mNom+" — Protocole AD LUCEM";
  document.getElementById("rl").innerHTML=html;
}

function renderProto(mNom,m,titre,proto,ok){
  if(!ok) return`<div class="mc" style="opacity:.45"><div class="mh"><div class="mn">${titre} <span style="font-size:.75rem;color:rgba(255,255,255,.3);font-weight:400">non compatible avec cette machine</span></div></div></div>`;
  let steps="",num=0;
  proto.forEach(s=>{
    if(s.type==="sep"){
      steps+=`<div style="display:flex;align-items:center;gap:10px;margin:6px 0"><div style="flex:1;height:1px;background:rgba(200,168,0,.2)"></div><span style="font-size:.72rem;font-weight:700;color:#c8a800;letter-spacing:.8px">${s.tool}</span><div style="flex:1;height:1px;background:rgba(200,168,0,.2)"></div></div>`;
      return;
    }
    const key=TOOL_KEY[s.tool];
    const compat=!key||m[key];
    num++;
    // N'afficher le diamètre QUE si l'outil a un diamètre ET que la machine en a un compatible
    const showDiam = s.diam && compat;
    steps+=`<div class="step" style="${compat?'':'opacity:.3;filter:grayscale(1)'}">
      <div class="snum">${num}</div>
      <div class="sinfo">
        <div class="sname">${s.tool}</div>
        ${s.note?`<div class="sdet">${s.note}</div>`:''}
      </div>
      ${s.grain?`<span class="stag">${s.grain}${s.eau?' 💧':''}</span>`:''}
      ${showDiam?`<span class="dim">Ø${s.diam}</span>`:''}
    </div>`;
  });
  return`<div class="mc r1" style="margin-bottom:16px"><div class="mh"><div class="mn">${titre}<span class="badge">AD LUCEM</span></div></div><div class="steps">${steps}</div></div>`;
}

function raz(){
  document.getElementById("machine").value="";
  document.getElementById("travail").value="";
  document.getElementById("res").style.display="none";
}
</script></body></html>
